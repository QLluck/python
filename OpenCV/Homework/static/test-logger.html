<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logger Test</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body style="padding: 2rem; background: #0f172a;">
  <div class="debug-panel" id="debugPanel">
    <div class="debug-header">
      <span class="debug-title">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        调试日志测试
      </span>
      <div class="debug-actions">
        <button type="button" id="clearLog" class="btn-icon-sm" title="清空日志">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </button>
        <button type="button" id="toggleLog" class="btn-icon-sm" title="展开/收起">
          <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="debug-content" id="debugLog"></div>
  </div>

  <div style="margin-top: 2rem;">
    <button onclick="testLogger()" style="padding: 0.5rem 1rem; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer;">
      测试日志
    </button>
  </div>

  <script src="/static/app.js"></script>
  <script>
    function testLogger() {
      Logger.info('这是一条 INFO 日志');
      Logger.success('这是一条 SUCCESS 日志', '带有详细信息');
      Logger.warning('这是一条 WARNING 日志');
      Logger.error('这是一条 ERROR 日志', '错误详情');
    }

    // 页面加载时自动测试
    window.addEventListener('DOMContentLoaded', () => {
      console.log('页面加载完成');
      Logger.info('页面已加载', '测试日志系统');
    });
  </script>
</body>
</html>
