<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点击坐标诊断工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
    .upload-section { background: #2a2a2a; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #00ff00; }
    .upload-zone { border: 3px dashed #00ff00; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-zone:hover { background: rgba(0, 255, 0, 0.1); }
    .upload-zone.drag-over { background: rgba(0, 255, 0, 0.2); }
    .main-content { display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
    .image-section { background: #2a2a2a; padding: 20px; border-radius: 8px; border: 2px solid #00ff00; }
    .image-container { position: relative; background: #000; border: 2px solid #444; min-height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #previewImage { max-width: 100%; max-height: 600px; display: block; cursor: crosshair; }
    #overlayCanvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }
    .info-section { background: #2a2a2a; padding: 20px; border-radius: 8px; border: 2px solid #00ff00; max-height: 800px; overflow-y: auto; }
    .info-block { background: #1a1a1a; padding: 10px; margin-bottom: 10px; border-left: 3px solid #00ff00; font-size: 12px; }
    .info-block h3 { color: #00ff00; margin-bottom: 8px; font-size: 14px; }
    .info-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #333; }
    .info-label { color: #888; }
    .info-value { color: #00ff00; font-weight: bold; }
    .error { color: #ff0000 !important; }
    .warning { color: #ffaa00 !important; }
    .success { color: #00ff00 !important; }
    .log-section { background: #1a1a1a; padding: 10px; margin-top: 10px; max-height: 300px; overflow-y: auto; font-size: 11px; border: 1px solid #333; }
    .log-entry { padding: 4px; border-bottom: 1px solid #222; }
    .btn { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; margin: 5px; }
    .btn:hover { background: #00cc00; }
    .btn-secondary { background: #666; color: #fff; }
    .btn-secondary:hover { background: #888; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #00ff00; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 点击坐标诊断工具</h1>
    <div class="upload-section">
      <div class="upload-zone" id="uploadZone">
        <p>📁 点击或拖放图像文件到这里</p>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">支持 JPG, PNG 格式</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
    <div class="main-content">
      <div class="image-section">
        <h2 style="margin-bottom: 10px;">图像预览</h2>
        <div class="image-container" id="imageContainer">
          <img id="previewImage" style="display: none;">
          <canvas id="overlayCanvas"></canvas>
          <p id="placeholder" style="color: #666;">等待上传图像...</p>
        </div>
        <div style="margin-top: 10px; text-align: center;">
          <button class="btn" id="clearBtn" disabled>清除标记</button>
          <button class="btn btn-secondary" id="toggleGridBtn">显示网格</button>
        </div>
      </div>
      <div class="info-section">
        <h2 style="margin-bottom: 10px;">诊断信息</h2>
        <div class="info-block">
          <h3>📐 图像尺寸信息</h3>
          <div class="info-row"><span class="info-label">原始尺寸:</span><span class="info-value" id="naturalSize">-</span></div>
          <div class="info-row"><span class="info-label">显示尺寸:</span><span class="info-value" id="displaySize">-</span></div>
          <div class="info-row"><span class="info-label">容器尺寸:</span><span class="info-value" id="containerSize">-</span></div>
          <div class="info-row"><span class="info-label">缩放比例:</span><span class="info-value" id="scaleRatio">-</span></div>
          <div class="info-row"><span class="info-label">居中偏移:</span><span class="info-value" id="offset">-</span></div>
        </div>
        <div class="info-block">
          <h3>🖱️ 鼠标位置</h3>
          <div class="info-row"><span class="info-label">屏幕坐标:</span><span class="info-value" id="screenCoord">-</span></div>
          <div class="info-row"><span class="info-label">容器坐标:</span><span class="info-value" id="containerCoord">-</span></div>
          <div class="info-row"><span class="info-label">图像坐标:</span><span class="info-value" id="imageCoord">-</span></div>
          <div class="info-row"><span class="info-label">原始坐标:</span><span class="info-value" id="actualCoord">-</span></div>
          <div class="info-row"><span class="info-label">状态:</span><span class="info-value" id="coordStatus">-</span></div>
        </div>
        <div class="info-block">
          <h3>👆 点击记录</h3>
          <div class="info-row"><span class="info-label">点击次数:</span><span class="info-value" id="clickCount">0</span></div>
          <div class="info-row"><span class="info-label">最后点击:</span><span class="info-value" id="lastClick">-</span></div>
        </div>
        <div class="log-section"><strong>📋 操作日志:</strong><div id="logContent"></div></div>
      </div>
    </div>
  </div>
  <script src="coordinate_diagnostic.js"></script>
</body>
</html>
